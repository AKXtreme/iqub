name: Flutter CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  analyze-and-test:
    name: Analyze & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # Create a placeholder firebase_options.dart so the project compiles in CI
      # (real Firebase is not needed for analysis and unit tests)
      - name: Create placeholder firebase_options.dart
        run: |
          cat > lib/firebase_options.dart << 'EOF'
          import 'package:firebase_core/firebase_core.dart' show FirebaseOptions;
          import 'package:flutter/foundation.dart' show defaultTargetPlatform, kIsWeb, TargetPlatform;
          class DefaultFirebaseOptions {
            static FirebaseOptions get currentPlatform => android;
            static const FirebaseOptions android = FirebaseOptions(
              apiKey: 'ci-placeholder',
              appId: '1:000000000000:android:0000000000000000',
              messagingSenderId: '000000000000',
              projectId: 'ci-placeholder',
              storageBucket: 'ci-placeholder.appspot.com',
            );
            static const FirebaseOptions ios = FirebaseOptions(
              apiKey: 'ci-placeholder',
              appId: '1:000000000000:ios:0000000000000000',
              messagingSenderId: '000000000000',
              projectId: 'ci-placeholder',
              storageBucket: 'ci-placeholder.appspot.com',
              iosBundleId: 'com.iqub.iqub',
            );
          }
          EOF

      - name: Check formatting
        run: dart format --output=none --set-exit-if-changed lib/ test/

      - name: Run analyzer
        run: flutter analyze

      - name: Run tests
        run: flutter test

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: analyze-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Create placeholder firebase_options.dart
        run: |
          cat > lib/firebase_options.dart << 'EOF'
          import 'package:firebase_core/firebase_core.dart' show FirebaseOptions;
          import 'package:flutter/foundation.dart' show defaultTargetPlatform, kIsWeb, TargetPlatform;
          class DefaultFirebaseOptions {
            static FirebaseOptions get currentPlatform => android;
            static const FirebaseOptions android = FirebaseOptions(
              apiKey: 'ci-placeholder',
              appId: '1:000000000000:android:0000000000000000',
              messagingSenderId: '000000000000',
              projectId: 'ci-placeholder',
              storageBucket: 'ci-placeholder.appspot.com',
            );
            static const FirebaseOptions ios = FirebaseOptions(
              apiKey: 'ci-placeholder',
              appId: '1:000000000000:ios:0000000000000000',
              messagingSenderId: '000000000000',
              projectId: 'ci-placeholder',
              storageBucket: 'ci-placeholder.appspot.com',
              iosBundleId: 'com.iqub.iqub',
            );
          }
          EOF

      - name: Build APK (debug)
        run: flutter build apk --debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7
